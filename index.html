<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>秋招岗位追踪器</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 顶部Header -->
  <div class="header">
    <div class="header-left">
      <h1>🎯 秋招岗位追踪器</h1>
      <p class="header-sub">✅ 实时抓取岗位 · 🔗 官网直达入口 · 每日更新</p>
    </div>
    <div class="header-right">
      <input type="text" id="search-input" placeholder="🔍 搜索岗位、公司、技能…" oninput="applyFilters()" />
      <div class="stat-pill" id="total-count">— 个岗位</div>
      <div class="stat-pill" id="update-time">更新中…</div>
      <button class="profile-btn" onclick="openProfile()">⚙️ 我的信息</button>
    </div>
  </div>

  <!-- 主体：左侧导航 + 右侧内容 -->
  <div class="layout">

    <!-- 左侧导航栏 -->
    <nav class="sidebar-nav">

      <div class="nav-section">
        <div class="nav-group-title">📱 互联网 & 科技</div>
        <button class="nav-item active" data-tab="internet" data-cat="AI" onclick="navClick(this)">🤖 AI & 数据</button>
        <button class="nav-item" data-tab="internet" data-cat="tech" onclick="navClick(this)">🖥️ 技术开发</button>
        <button class="nav-item" data-tab="internet" data-cat="product" onclick="navClick(this)">📱 产品</button>
        <button class="nav-item" data-tab="internet" data-cat="ops" onclick="navClick(this)">📣 运营 & 商务</button>
        <button class="nav-item" data-tab="internet" data-cat="all" onclick="navClick(this)">· 全部互联网</button>
      </div>

      <div class="nav-section">
        <div class="nav-group-title">🏦 金融 & 投行</div>
        <button class="nav-item" data-tab="finance" data-cat="ib" onclick="navClick(this)">🏛️ 外资投行</button>
        <button class="nav-item" data-tab="finance" data-cat="consulting" onclick="navClick(this)">🎯 战略咨询</button>
        <button class="nav-item" data-tab="finance" data-cat="bigfour" onclick="navClick(this)">📋 四大会计师</button>
        <button class="nav-item" data-tab="finance" data-cat="quant" onclick="navClick(this)">📊 量化 & 数据</button>
        <button class="nav-item" data-tab="finance" data-cat="all" onclick="navClick(this)">· 全部金融外企</button>
      </div>

      <div class="nav-section">
        <div class="nav-group-title">🏛️ 国央企</div>
        <button class="nav-item" data-tab="state" data-cat="bank" onclick="navClick(this)">🏦 国有银行</button>
        <button class="nav-item" data-tab="state" data-cat="sec" onclick="navClick(this)">📈 国有证券</button>
        <button class="nav-item" data-tab="state" data-cat="ins" onclick="navClick(this)">🛡️ 国有保险</button>
        <button class="nav-item" data-tab="state" data-cat="央企" onclick="navClick(this)">🏗️ 其他央企</button>
        <button class="nav-item" data-tab="state" data-cat="all" onclick="navClick(this)">· 全部国央企</button>
      </div>

      <div class="nav-section">
        <div class="nav-group-title">🛍️ 消费 & 零售</div>
        <button class="nav-item" data-tab="consumer" data-cat="beauty" onclick="navClick(this)">💄 美妆</button>
        <button class="nav-item" data-tab="consumer" data-cat="fmcg" onclick="navClick(this)">🛒 快消</button>
        <button class="nav-item" data-tab="consumer" data-cat="sports" onclick="navClick(this)">👟 运动</button>
        <button class="nav-item" data-tab="consumer" data-cat="luxury" onclick="navClick(this)">💎 奢侈品</button>
        <button class="nav-item" data-tab="consumer" data-cat="all" onclick="navClick(this)">· 全部消费零售</button>
      </div>

      <div class="nav-section">
        <div class="nav-group-title">🏭 制造 & 工业</div>
        <button class="nav-item" data-tab="mfg" data-cat="auto" onclick="navClick(this)">🚗 汽车</button>
        <button class="nav-item" data-tab="mfg" data-cat="energy" onclick="navClick(this)">⚡ 能源化工</button>
        <button class="nav-item" data-tab="mfg" data-cat="all" onclick="navClick(this)">· 全部制造工业</button>
      </div>

      <div class="nav-section">
        <div class="nav-group-title">🏥 医疗 & 生命科学</div>
        <button class="nav-item" data-tab="health" data-cat="pharma" onclick="navClick(this)">💊 医药</button>
        <button class="nav-item" data-tab="health" data-cat="device" onclick="navClick(this)">🔬 医疗器械</button>
        <button class="nav-item" data-tab="health" data-cat="all" onclick="navClick(this)">· 全部医疗健康</button>
      </div>

      <div class="nav-section">
        <div class="nav-group-title">✈️ 其他外企</div>
        <button class="nav-item" data-tab="other" data-cat="logistics" onclick="navClick(this)">📦 物流</button>
        <button class="nav-item" data-tab="other" data-cat="food" onclick="navClick(this)">🍔 餐饮零售</button>
        <button class="nav-item" data-tab="other" data-cat="all" onclick="navClick(this)">· 全部其他外企</button>
      </div>

      <div class="nav-section">
        <div class="nav-group-title">我的</div>
        <button class="nav-item" data-tab="applied" data-cat="all" onclick="navClick(this)">📋 已投递 <span class="applied-badge" id="applied-badge" style="display:none">0</span></button>
      </div>

    </nav>

    <!-- 右侧内容区 -->
    <main class="main-content">

      <!-- 筛选栏 -->
      <div class="filters" id="filters-bar">
        <select id="new-filter" onchange="applyFilters()">
          <option value="">全部时间</option>
          <option value="new">🆕 只看新岗位</option>
        </select>
        <select id="location-filter" onchange="applyFilters()">
          <option value="">全部城市</option>
          <option value="北京">北京</option>
          <option value="上海">上海</option>
          <option value="深圳">深圳</option>
          <option value="杭州">杭州</option>
        </select>
      </div>

      <!-- 找岗位 -->
      <div id="page-jobs">
        <div id="cards-container"></div>
      </div>

      <!-- 已投递 -->
      <div id="page-applied" style="display:none">
        <div class="applied-empty" id="applied-empty">
          <div style="font-size:3rem">📭</div>
          <p>还没有投递记录</p>
          <p style="color:#999;font-size:0.9rem">在岗位卡片点击"投递此岗位"即可追踪进度</p>
        </div>
        <div id="applied-list"></div>
      </div>

    </main>
  </div>

  <!-- 岗位详情弹窗 -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
  <div class="modal" id="job-modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>

  <!-- 生成材料侧边栏 -->
  <div class="sidebar" id="material-sidebar">
    <div class="sidebar-header">
      <h3>✨ 定制申请材料</h3>
      <button onclick="closeSidebar()">✕</button>
    </div>
    <div class="sidebar-tabs">
      <button class="stab active" onclick="switchSTab('resume')">简历亮点</button>
      <button class="stab" onclick="switchSTab('coverletter')">求职信</button>
      <button class="stab" onclick="switchSTab('prompt')">AI提示词</button>
    </div>
    <div id="sidebar-body"></div>
    <div class="sidebar-actions">
      <button onclick="copySidebar()">📋 复制</button>
      <button onclick="downloadSidebar()">⬇ 下载</button>
    </div>
  </div>

  <!-- Profile 弹窗 -->
  <div class="modal-overlay" id="profile-overlay" onclick="closeProfile()" style="display:none"></div>
  <div class="profile-modal" id="profile-modal" style="display:none">
    <div class="profile-header">
      <h2>⚙️ 我的信息</h2>
      <button onclick="closeProfile()">✕</button>
    </div>
    <div class="profile-body">
      <label>姓名</label>
      <input type="text" id="p-name" placeholder="Your name" />
      <label>最高学历</label>
      <input type="text" id="p-edu1" placeholder="Degree, Major, University (Year)" />
      <label>本科</label>
      <input type="text" id="p-edu2" placeholder="Degree, Major, University (Year)" />
      <label>研究/实习经历（简述）</label>
      <textarea id="p-exp" rows="3" placeholder="Role — Company (brief description)"></textarea>
      <label>技能</label>
      <input type="text" id="p-skills" placeholder="Python, SQL, 机器学习, 数据分析…" />
      <label>求职意向方向（按 Enter 添加标签）</label>
      <div class="tags-input-wrap">
        <div class="tags-display" id="tags-display"></div>
        <input type="text" id="tags-input" placeholder="输入方向后按 Enter" onkeydown="addTag(event)" />
      </div>
      <hr style="margin:1rem 0;border-color:#eee"/>
      <label>📄 简历原文（粘贴）</label>
      <textarea id="p-resume" rows="5" placeholder="粘贴你的简历全文，生成材料时会用到"></textarea>
      <label>✍️ 求职信原文（粘贴）</label>
      <textarea id="p-coverletter" rows="4" placeholder="粘贴你之前写过的求职信（可选）"></textarea>
    </div>
    <div class="profile-footer">
      <button class="btn-save" onclick="saveProfile()">保存</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
